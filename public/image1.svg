<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" width="400" height="220">
  <title>ME — Mahalaxmi Enterprise</title>
  <desc>Logo mark for Mahalaxmi Enterprise featuring bold ME monogram in black and coral red</desc>

  <!-- Background: transparent -->

  <!-- M — bold black -->
  <text
    x="20"
    y="168"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-size="148"
    font-weight="900"
    fill="#1A1A1A"
    letter-spacing="-4"
  >M</text>

  <!-- E — coral red -->
  <text
    x="198"
    y="168"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-size="148"
    font-weight="900"
    fill="#E8442A"
    letter-spacing="-4"
  >E</text>

  <!-- Red underline accent bar -->
  <rect x="20" y="178" width="330" height="7" rx="3.5" fill="#E8442A"/>

  <!-- Terminating dot on right -->
  <circle cx="362" cy="181" r="7" fill="#1A1A1A"/>

  <!-- Tagline -->
  <text
    x="20"
    y="210"
    font-family="'Arial', Helvetica, sans-serif"
    font-size="13"
    font-weight="400"
    fill="#888888"
    letter-spacing="4"
  >MAHALAXMI ENTERPRISE</text>
</svg>
